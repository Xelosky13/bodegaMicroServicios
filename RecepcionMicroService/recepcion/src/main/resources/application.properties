spring.application.name=recepcion
server.port=8080

# Configuración de Base de Datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_recepcion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA / Hibernate - Con Flyway desactivamos la creación automática de Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Activación de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true